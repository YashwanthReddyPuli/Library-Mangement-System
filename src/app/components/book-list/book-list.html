<div style="padding: 30px; font-family: 'Segoe UI', sans-serif; background-color: #ffffff;">
  <h2 style="color: #333; margin-bottom: 20px;">Master Inventory</h2>

  <div style="background-color: #f0f7ff; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #d0e3ff;">
    <h4 style="margin-top: 0; color: #0056b3;">Add New Record</h4>
    <input #t type="text" placeholder="Book Title" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-right: 10px; width: 250px;">
    <input #a type="text" placeholder="Author" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-right: 10px; width: 200px;">
    <button (click)="addNew(t.value, a.value); t.value=''; a.value=''" 
            style="padding: 8px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
      Add to System
    </button>
  </div>

  <table style="width: 100%; border-collapse: collapse;">
    <thead>
      <tr style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; text-align: left;">
        <th style="padding: 12px;">ID</th>
        <th style="padding: 12px;">Title</th>
        <th style="padding: 12px;">Author</th>
        <th style="padding: 12px;">Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of books" style="border-bottom: 1px solid #eee;">
        <td style="padding: 12px; color: #666;">{{ b.id }}</td>
        <td style="padding: 12px; font-weight: 500;">{{ b.title }}</td>
        <td style="padding: 12px;">{{ b.author }}</td>
        <td style="padding: 12px;">
          <span [style.color]="b.isAvailable ? '#28a745' : '#dc3545'" style="font-weight: bold;">
            {{ b.isAvailable ? 'Available' : 'Borrowed' }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
