<div class="return-container fade-in">
  <h2 class="header-title">
    <mat-icon style="vertical-align: middle; margin-right: 8px; color: var(--royal-gold);">history_edu</mat-icon>
    Restore to Archives
  </h2>

  <div class="ledger-container mat-elevation-z8" *ngIf="dataSource.data.length > 0">
    <table mat-table [dataSource]="dataSource" class="full-width">
      
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let b" style="color: #777;"> {{b.id}} </td>
      </ng-container>

      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Book Title </th>
        <td mat-cell *matCellDef="let b" style="font-weight: 500;"> {{b.title | uppercase}} </td>
      </ng-container>

      <!-- Author Column -->
      <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef> Author </th>
        <td mat-cell *matCellDef="let b"> {{b.author}} </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef style="text-align: right; padding-right: 20px;"> Action </th>
        <td mat-cell *matCellDef="let b" style="text-align: right; padding-right: 20px;">
          <button mat-raised-button 
                  class="return-button"
                  (click)="returnBook(b)">
            <mat-icon>history</mat-icon>
            Restore
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <div *ngIf="dataSource.data.length === 0" class="empty-state fade-in">
    <mat-icon style="font-size: 64px; width: 64px; height: 64px; margin-bottom: 20px;">task_alt</mat-icon>
    <p>All archival tomes are currently accounted for in the Vault.</p>
  </div>
</div>
