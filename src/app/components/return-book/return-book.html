<div style="padding: 20px; font-family: sans-serif;">
  <h2>📤 Return Borrowed Books</h2>
  
  <div *ngIf="books.length === 0" style="text-align: center; padding: 20px; color: #666; background: #f9f9f9; border-radius: 8px;">
    <p>No books are currently borrowed. You can borrow some from the Inventory page!</p>
  </div>

  <table *ngIf="books.length > 0" border="1" style="width: 100%; border-collapse: collapse; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <tr style="background-color: #f8f9fa;">
      <th style="padding: 10px;">Book Title</th>
      <th style="padding: 10px;">Author</th>
      <th style="padding: 10px;">Action</th>
    </tr>
    <tr *ngFor="let b of books">
      <td style="padding: 10px;">{{ b.title }}</td>
      <td style="padding: 10px;">{{ b.author }}</td>
      <td style="padding: 10px;">
        <button (click)="returnBook(b.id)" style="cursor: pointer; color: white; background: #dc3545; border: none; padding: 5px 10px; border-radius: 4px;">
          Return Now
        </button>
      </td>
    </tr>
  </table>
</div>
