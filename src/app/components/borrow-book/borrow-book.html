<div style="padding: 30px; font-family: 'Segoe UI', sans-serif;">
  <h2 style="color: #333;">Borrow a Book</h2>
  
  <div style="margin-bottom: 25px;">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search for books to borrow..." 
           style="width: 100%; padding: 15px; border: 2px solid #28a745; border-radius: 8px; font-size: 16px;">
  </div>

  <table style="width: 100%; border-collapse: collapse;">
    <tr style="background-color: #f1fcf4; border-bottom: 2px solid #28a745; text-align: left;">
      <th style="padding: 12px;">Book Title</th>
      <th style="padding: 12px;">Author</th>
      <th style="padding: 12px; text-align: center;">Action</th>
    </tr>
    <tr *ngFor="let b of filteredBooks" style="border-bottom: 1px solid #f0f0f0;">
      <td style="padding: 15px; font-weight: 500;">{{ b.title }}</td>
      <td style="padding: 15px;">{{ b.author }}</td>
      <td style="padding: 15px; text-align: center;">
        <button (click)="borrow(b.id)" [disabled]="!b.isAvailable"
                [style.background-color]="b.isAvailable ? '#28a745' : '#e9ecef'"
                style="color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
          {{ b.isAvailable ? 'Borrow' : 'Currently Out' }}
        </button>
      </td>
    </tr>
  </table>
</div>
