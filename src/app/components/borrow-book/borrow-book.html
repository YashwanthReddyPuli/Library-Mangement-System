<div style="padding: 30px; font-family: 'Segoe UI', sans-serif;">
  <h2 style="color: #333;">Borrow a Book</h2>
  <p style="color: #666; margin-bottom: 20px;">Select a title to add to your borrowed list.</p>

  <table style="width: 100%; border-collapse: collapse;">
    <tr style="background-color: #f1fcf4; border-bottom: 2px solid #28a745; text-align: left;">
      <th style="padding: 12px;">Book Details</th>
      <th style="padding: 12px;">Author</th>
      <th style="padding: 12px; text-align: center;">Availability</th>
    </tr>
    <tr *ngFor="let b of books" style="border-bottom: 1px solid #f0f0f0;">
      <td style="padding: 15px; font-weight: 500;">{{ b.title }}</td>
      <td style="padding: 15px;">{{ b.author }}</td>
      <td style="padding: 15px; text-align: center;">
        <button 
          (click)="borrow(b.id)" 
          [disabled]="!b.isAvailable"
          [style.background-color]="b.isAvailable ? '#28a745' : '#e9ecef'"
          [style.color]="b.isAvailable ? 'white' : '#6c757d'"
          style="border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; min-width: 120px;">
          {{ b.isAvailable ? 'Borrow Now' : 'Unavailable' }}
        </button>
      </td>
    </tr>
  </table>
</div>
