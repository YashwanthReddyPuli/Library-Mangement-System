<div class="borrow-container fade-in">
  <h2 class="header-title">
    <mat-icon style="vertical-align: middle; margin-right: 8px; color: var(--royal-gold);">library_add</mat-icon>
    Claim an Archive Tome
  </h2>
  
  <mat-card class="borrow-card">
    <mat-card-header>
      <mat-card-title>Royal Requisitions</mat-card-title>
    </mat-card-header>

    <mat-card-content style="padding-top: 15px;">
      <form [formGroup]="borrowForm" class="input-row">
        
        <mat-form-field appearance="outline" style="flex: 1; min-width: 250px;">
          <mat-label>Member ID</mat-label>
          <input matInput type="text" formControlName="memberId" placeholder="Enter Member ID">
          <mat-icon matSuffix>badge</mat-icon>
          <mat-error *ngIf="borrowForm.get('memberId')?.invalid && borrowForm.get('memberId')?.touched">
            Numeric Member ID is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="flex: 2; min-width: 400px;">
          <mat-label>Search Library</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput type="text" formControlName="searchTerm" placeholder="Search by title or author...">
        </mat-form-field>

      </form>
    </mat-card-content>
  </mat-card>

  <div class="ledger-container mat-elevation-z8" style="margin-top: 3rem;">
    <table mat-table [dataSource]="books | bookFilter:searchTerm" class="full-width">
      
      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Book Title </th>
        <td mat-cell *matCellDef="let b" style="font-weight: 500;"> {{b.title}} </td>
      </ng-container>

      <!-- Author Column -->
      <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef> Author </th>
        <td mat-cell *matCellDef="let b"> {{b.author}} </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef class="mat-column-action"> Action </th>
        <td mat-cell *matCellDef="let b" class="mat-column-action">
          <button mat-raised-button 
                  class="gold-button"
                  (click)="borrow(b)" 
                  [disabled]="!b.isAvailable || borrowForm.invalid">
            <mat-icon>{{ b.isAvailable ? 'auto_stories' : 'lock' }}</mat-icon>
            {{ b.isAvailable ? 'Claim' : 'Held by Another' }}
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
